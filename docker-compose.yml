services:
  backend:
    build: ./backend
    container_name: personal-web-backend
    restart: unless-stopped
    network_mode: host
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M

  frontend:
    build: ./frontend
    container_name: personal-web-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 64M
